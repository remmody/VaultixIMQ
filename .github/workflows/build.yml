name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# permissions moved to job level

jobs:
  build:
    name: Build (${{ matrix.os }} - ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            runner: windows-latest
            ext: .exe
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            ext: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsecret-1-dev libayatana-appindicator3-dev pkg-config upx-ucl

      - name: Build Global Version
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Frontend
        working-directory: ./frontend
        run: npm install --ignore-scripts

      - name: Wails Build
        run: |
          if [ "${{ matrix.os }}" == "linux" ]; then
            wails build -platform ${{ matrix.os }}/${{ matrix.arch }} -tags webkit2_41 -ldflags "-s -w -X 'github.com/remmody/VaultixIMQ/internal/app.Version=v$BUILD_VERSION'"
          else
            wails build -platform ${{ matrix.os }}/${{ matrix.arch }} -ldflags "-s -w -X 'github.com/remmody/VaultixIMQ/internal/app.Version=v$BUILD_VERSION'"
          fi

      - name: Compress with UPX
        if: runner.os == 'Linux'
        run: |
          upx --best build/bin/*

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p release
          mv build/bin/* release/
          cd release
          for f in *; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vaultix-imq-${{ matrix.os }}-${{ matrix.arch }}
          path: release/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: SoftProps Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}