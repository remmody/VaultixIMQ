name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# permissions moved to job level

jobs:
  build:
    name: Build (${{ matrix.os }} - ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            runner: windows-latest
            ext: .exe
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            ext: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@f1339031df58674934e063f11071d9893902c612 # v5.3.0
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@1d11999a6aee6ff8e26f352cff6139a957051343 # v4.2.0
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Global Version
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Frontend
        working-directory: ./frontend
        run: npm install --ignore-scripts

      - name: Wails Build
        run: |
          wails build -platform ${{ matrix.os }}/${{ matrix.arch }} -ldflags "-X 'github.com/remmody/VaultixIMQ/internal/app.Version=v$BUILD_VERSION'"

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p release
          mv build/bin/* release/
          cd release
          for f in *; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@4cedc548e9089f417865b2106297290c015b6cdb # v4.6.1
        with:
          name: vaultix-imq-${{ matrix.os }}-${{ matrix.arch }}
          path: release/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.8
        with:
          path: artifacts
          merge-multiple: true

      - name: SoftProps Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8ad5bfbd9eb628 # v2.2.1
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}