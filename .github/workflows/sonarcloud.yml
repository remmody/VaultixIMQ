name: SonarCloud

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# permissions moved to job level

jobs:
  sonar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@f1339031df58674934e063f11071d9893902c612 # v5.3.0
        with:
          go-version: '1.25'

      - uses: actions/setup-node@1d11999a6aee6ff8e26f352cff6139a957051343 # v4.2.0
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install --ignore-scripts
          npm run build

      - name: Run tests with coverage
        run: go test ./... -coverprofile=cover.out

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@bb47033d5bd0f7579735d4edcfc071d79633c69c # v4.0.0
        env:
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
