name: SonarCloud analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  pull-requests: read # allows SonarCloud to decorate PRs with analysis results

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install --ignore-scripts
          npm run build

      - name: Run tests with coverage
        run: go test ./... -coverprofile=cover.out

      - name: Analyze with SonarCloud
        # Pinning the exact commit SHA for third-party action as per marketplace recommendation
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216 # v2.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # Optional: add args here if you want to override sonar-project.properties
          args:
            -Dsonar.projectKey=remmody_VaultixIMQ
            -Dsonar.organization=r3-code
            -Dsonar.go.coverage.reportPaths=cover.out
